<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>{% block title %}Kryonix{% endblock %}</title>

    {# FIX: Removed trailing whitespace from CDN URL that caused a 404 on every page load #}
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        /* Dynamic theme colours injected from session */
        :root {
            --primary-color: {{ session.get('primary_color', '#0f0f0f') | e }};
            --accent-color:  {{ session.get('accent_color',  '#ff3f81') | e }};
        }

        /* ── Page Transition Overlay ──────────────────────────────────────────── */
        #page-transition-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #1a0a3c 0%, #0f0a2e 40%, #0d0d1a 100%);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 1;
            visibility: visible;
            /* FIX: visibility delay matches opacity so it isn't immediately hidden */
            transition: opacity 1.5s cubic-bezier(0.23, 1, 0.32, 1),
                        visibility 0s linear 1.5s;
            animation: pulseGlow 4s ease-in-out infinite;
        }

        #page-transition-overlay.inactive {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        #page-transition-overlay .logo {
            color: white;
            font-size: 4rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 6px;
            opacity: 0;
            transform: scale(0.5) rotateX(90deg);
            transition: all 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            text-shadow: 0 0 15px rgba(128, 0, 255, 0.7);
        }

        #page-transition-overlay .logo::before {
            content: attr(data-text);
            position: absolute;
            inset: 0;
            color: transparent;
            background: linear-gradient(90deg, #8a2be2, #4b0082, #0000ff, #1e90ff);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 300% 300%;
            animation: shine 3s infinite;
            z-index: -1;
            filter: blur(1px);
            opacity: 0.7;
        }

        #page-transition-overlay:not(.inactive) .logo {
            opacity: 1;
            transform: scale(1) rotateX(0);
            transition: all 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s;
        }

        @keyframes pulseGlow {
            0%   { box-shadow: inset 0 0  50px rgba(75,  0, 130, 0.5); }
            50%  { box-shadow: inset 0 0 100px rgba(128, 0, 255, 0.7); }
            100% { box-shadow: inset 0 0  50px rgba(75,  0, 130, 0.5); }
        }

        @keyframes shine {
            0%   { background-position: 0%   50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0%   50%; }
        }
        /* ── End Page Transition Overlay ────────────────────────────────────── */
    </style>

    <meta name="csrf-token" content="{{ csrf_token() }}">
    {% block head %}{% endblock %}
</head>
<body>
    <div id="page-transition-overlay" role="presentation" aria-hidden="true">
        <div class="logo" data-text="KRYONIX">KRYONIX</div>
    </div>

    {% block content %}{% endblock %}

    <script>
    // ── Page Transition Script ──────────────────────────────────────────────────
    (function () {
        'use strict';

        var overlay = document.getElementById('page-transition-overlay');

        // Fade out the overlay when the page has loaded
        requestAnimationFrame(function () {
            setTimeout(function () {
                overlay.classList.add('inactive');
            }, 10);
        });

        // Intercept link clicks and show the overlay before navigating
        document.body.addEventListener('click', function (e) {
            var link = e.target.closest('a');
            if (!link) return;

            var href = link.getAttribute('href');

            // FIX: Don't intercept links that shouldn't trigger a full-page transition:
            //   • missing or empty href
            //   • opens in a new tab / window  (_blank, _top, …)
            //   • download links
            //   • pure hash anchors  (#section)
            //   • mailto:, tel:, javascript: pseudo-protocols
            //   • links opted-out via data-no-transition attribute
            if (
                !href ||
                link.target ||
                link.hasAttribute('download') ||
                href.charAt(0) === '#' ||
                href.indexOf('mailto:') === 0 ||
                href.indexOf('tel:') === 0 ||
                href.indexOf('javascript:') === 0 ||
                link.hasAttribute('data-no-transition')
            ) {
                return;
            }

            e.preventDefault();
            overlay.classList.remove('inactive');

            // FIX: Reduced delay to 1800ms (was 2700ms) to match the actual
            // animation duration so users aren't staring at a finished animation
            setTimeout(function () {
                window.location.href = link.href;
            }, 1800);
        });
    }());
    // ── End Page Transition Script ──────────────────────────────────────────────
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>

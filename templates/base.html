<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>{% block title %}Kryonix{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* Dynamic theme */
        :root {
            --current-theme: {{ session.get('theme', 'light') }};
        }
        
        [data-theme="{{ session.get('theme', 'light') }}"] {
            /* Theme variables are already in CSS */
        }

        /* Page Transition Overlay - Simplified */
        #page-transition-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 1;
            visibility: visible;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        #page-transition-overlay.inactive {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        #page-transition-overlay .logo {
            color: var(--primary);
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 3px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease 0.2s;
        }

        #page-transition-overlay:not(.inactive) .logo {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
    <meta name="csrf-token" content="{{ csrf_token() }}">
</head>
<body data-theme="{{ session.get('theme', 'light') }}">
    <div id="page-transition-overlay">
        <div class="logo">KRYONIX</div>
    </div>

    {% block content %}{% endblock %}

    <script>
    // Page Transition Script
    document.addEventListener('DOMContentLoaded', function() {
        const pageTransitionOverlay = document.getElementById('page-transition-overlay');

        // Handle link clicks
        document.body.addEventListener('click', function(event) {
            const link = event.target.closest('a');
            if (link && link.href && !link.target && !link.hasAttribute('download')) {
                event.preventDefault();
                pageTransitionOverlay.classList.remove('inactive');
                setTimeout(function() {
                    window.location.href = link.href;
                }, 800);
            }
        });

        // Fade out overlay on new page load
        requestAnimationFrame(() => {
            setTimeout(() => {
                pageTransitionOverlay.classList.add('inactive');
            }, 10);
        });
    });
    </script>
</body>
</html>

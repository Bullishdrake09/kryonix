# coturn TURN Server configuration for Kryonix WebRTC
listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0

# Replace with your server's public IP
# external-ip=YOUR_PUBLIC_IP

realm=yourdomain.com
server-name=kryonix-turn

# Time-limited HMAC credentials (set same secret as TURN_SECRET in .env)
use-auth-secret
static-auth-secret=CHANGE_ME_same_as_TURN_SECRET

# TLS certificates (Let's Encrypt via certbot or Caddy)
# cert=/etc/letsencrypt/live/yourdomain.com/fullchain.pem
# pkey=/etc/letsencrypt/live/yourdomain.com/privkey.pem

# Performance
total-quota=100
max-bps=10000000
min-port=49152
max-port=65535

# Security
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
allowed-peer-ip=0.0.0.0-255.255.255.255

# Logging
log-file=/var/log/coturn/turn.log
